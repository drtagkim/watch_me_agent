# ═══════════════════════════════════════════════════════════
# 🎙️ Yoon Ina's Academic Watch - Preferences (v0.0.4)
# ═══════════════════════════════════════════════════════════
# 이 파일의 설정값을 수정하면 프로그램 동작이 변경됩니다.
# CLI 옵션(--chunk, --focus)이 주어지면 해당 항목만 덮어씁니다.

# ── 국면(Chunk) 분석 설정 ──────────────────────────────────
chunk:
  duration_seconds: 30        # 1개 국면의 길이 (초). CLI --chunk 또는 watch_run.sh 대화형 입력으로도 변경 가능.
  focus_area: ""              # 집중 분석 키워드 (예: "투자 피칭", "학술 심사"). CLI --focus로도 지정 가능.

# ── 이미지 캡처 설정 ───────────────────────────────────────
capture:
  frame_interval_seconds: 3    # 국면 내 화면 캡처 간격 (초). GIF 프레임 전환 속도에도 동일 적용됩니다.
  image_width: 472             # Gemini에 전송할 프레임 가로 해상도 (px)
  image_height: 354            # Gemini에 전송할 프레임 세로 해상도 (px)
  jpeg_quality: 60             # JPEG 압축 품질 (1~100). 높을수록 선명하지만 토큰 소비 증가.

# ── 오디오 설정 ────────────────────────────────────────────
audio:
  sample_rate: 16000           # 마이크 샘플링 레이트 (Hz). 16kHz = Gemini STT 최적.

# ── Gemini 모델 설정 ───────────────────────────────────────
model:
  name: "gemini-3.1-pro-preview"  # 사용할 Gemini 모델 이름

# ── 카메라(비디오) 설정 ────────────────────────────────────
camera:
  width: 640                   # 웹캠 캡처 가로 해상도
  height: 480                  # 웹캠 캡처 세로 해상도
  warmup_frames: 10            # 자동 노출 워밍업용 빈 프레임 수
  fps_sleep: 0.03              # 프레임 읽기 간격 (초). 약 30fps.

# ── 시스템 설정 ────────────────────────────────────────────
system:
  temp_dir: "temp"             # 임시 파일 저장 폴더
  thread_workers: 3            # 분석 병렬 워커 수 (M3 최적: 3)
